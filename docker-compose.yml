version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: geotab_postgres
    environment:
      POSTGRES_DB: geotab_gps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geotab_network

  # Aplicación Flask
  app:
    build: .
    container_name: geotab_app
    environment:
      GEOTAB_USERNAME: ${GEOTAB_USERNAME}
      GEOTAB_PASSWORD: ${GEOTAB_PASSWORD}
      GEOTAB_DATABASE: ${GEOTAB_DATABASE}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: geotab_gps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${APP_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
    networks:
      - geotab_network
    restart: unless-stopped

  # Sincronización Geotab → GPSWox 173 (cada 5 minutos)
  live_sync:
    build: .
    container_name: geotab_live_sync
    command: python gpswox_live_sync.py
    environment:
      GEOTAB_USERNAME: ${GEOTAB_USERNAME}
      GEOTAB_PASSWORD: ${GEOTAB_PASSWORD}
      GEOTAB_DATABASE: ${GEOTAB_DATABASE}
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
    restart: unless-stopped
    networks:
      - geotab_network

  # Sincronización Geotab → plataforma.sistemagps.online (cada 5 minutos)
  plataforma_sync:
    build: .
    container_name: geotab_plataforma_sync
    command: python plataforma_live_sync.py
    environment:
      GEOTAB_USERNAME: ${GEOTAB_USERNAME}
      GEOTAB_PASSWORD: ${GEOTAB_PASSWORD}
      GEOTAB_DATABASE: ${GEOTAB_DATABASE}
      PLATAFORMA_EMAIL: ${PLATAFORMA_EMAIL:-gerencia@rastrear.com.co}
      PLATAFORMA_PASSWORD: ${PLATAFORMA_PASSWORD:-a791025*}
      PLATAFORMA_HISTORY_DAYS: ${PLATAFORMA_HISTORY_DAYS:-0}
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
    restart: unless-stopped
    networks:
      - geotab_network

  # PWA GPS Tracker → GPSWox (pruebas)
  pwa_tracker:
    build: ./pwa_tracker
    container_name: pwa_tracker
    ports:
      - "5051:5050"
    environment:
      GPSWOX_API_URL: "http://173.212.203.163/api"
      GPSWOX_OSMAND_URL: "http://173.212.203.163:6055/"
    restart: unless-stopped
    networks:
      - geotab_network

volumes:
  postgres_data:

networks:
  geotab_network:
    driver: bridge
